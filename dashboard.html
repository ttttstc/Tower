<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Tower · 事项大盘</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --design-w:1672;
  --design-h:941;
  --gold:#d8a55d;
  --gold-strong:#f0c781;
  --ink:#28170c;
  --panel:rgba(26,15,8,.78);
  --panel-border:rgba(212,168,90,.48);
  --text:#f0e0b7;
  --muted:#b79f75;
  --shadow:0 10px 28px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html,body{
  margin:0;padding:0;width:100%;height:100%;
  overflow:hidden;background:#120904;
  font-family:"Noto Sans SC",-apple-system,sans-serif;color:var(--text);
}

.stage{
  position:absolute;top:50%;left:50%;
  width:calc(var(--design-w) * 1px);
  height:calc(var(--design-h) * 1px);
  transform:translate(-50%,-50%) scale(var(--scale,1));
  transform-origin:center center;
  background:
    linear-gradient(180deg, rgba(18,9,4,.3) 0%, rgba(18,9,4,.18) 24%, rgba(18,9,4,.22) 100%),
    url("UX/resource/dashboard/shelf-background.png") center/cover no-repeat;
  overflow:hidden;
}

.header{
  position:absolute;left:28px;right:28px;top:18px;
  display:grid;grid-template-columns:250px 1fr 250px;align-items:center;z-index:6;
}
.back-link{
  justify-self:start;display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:8px;text-decoration:none;
  color:#f2e0b2;background:rgba(38,20,10,.74);
  border:1px solid rgba(216,165,93,.5);
  box-shadow:inset 0 0 0 1px rgba(255,220,160,.06);
  font-family:"Noto Serif SC",serif;font-size:14px;letter-spacing:.04em;
}
.back-link:hover{color:#fff1c5;background:rgba(56,28,12,.84)}
.title-wrap{position:relative;justify-self:center;width:420px;height:64px}
.title-plate{
  width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.35));
}
.title-text{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Serif SC",serif;font-size:28px;font-weight:900;letter-spacing:.32em;
  color:#fff3cf;text-shadow:0 2px 6px rgba(0,0,0,.45);padding-left:.32em;
}
.overall{
  justify-self:end;display:flex;align-items:center;gap:10px;
  background:rgba(26,15,8,.7);border:1px solid rgba(216,165,93,.38);
  padding:12px 16px;border-radius:12px;box-shadow:var(--shadow);
}
.overall .lbl{font-size:13px;color:var(--muted);font-family:"Noto Serif SC",serif;letter-spacing:.08em}
.overall .pct{font-size:34px;font-weight:700;color:#7ed176;font-family:Georgia,serif;line-height:1}

.plaque-col{
  position:absolute;left:54px;top:146px;width:160px;
  display:flex;flex-direction:column;gap:18px;z-index:6;
}
.plaque-item{
  position:relative;height:122px;cursor:pointer;
  transition:transform .16s ease, filter .16s ease, opacity .16s ease;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.28));
}
.plaque-item:hover,.plaque-item.active{
  transform:translateX(8px);
  filter:drop-shadow(0 12px 24px rgba(0,0,0,.34)) brightness(1.05);
}
.plaque-bg{
  position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
}
.plaque-item .pct{
  position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
  font-family:Georgia,serif;font-size:17px;font-weight:700;color:#92d569;
  text-shadow:0 2px 4px rgba(0,0,0,.45);
}

.board{
  position:absolute;left:260px;top:125px;width:1114px;height:712px;z-index:5;
}
.board::before{
  content:"";position:absolute;inset:0;border:1px solid rgba(216,165,93,.24);border-radius:8px;
  box-shadow:inset 0 0 28px rgba(0,0,0,.1);pointer-events:none;
}
.shelf-row{
  position:absolute;left:24px;right:28px;height:118px;
  display:flex;align-items:flex-end;gap:8px;padding:6px 0 0;
}
.shelf-row.active::after{
  content:"";position:absolute;left:-10px;right:-6px;top:-6px;bottom:-4px;
  border-radius:18px;background:rgba(255,215,138,.06);box-shadow:inset 0 0 0 1px rgba(240,199,129,.16);
  pointer-events:none;
}

.book{
  position:relative;flex:none;background:center/100% 100% no-repeat;cursor:pointer;
  transition:transform .18s ease, filter .18s ease, opacity .18s ease;
  transform-origin:bottom center;
  filter:drop-shadow(0 5px 6px rgba(0,0,0,.32));
}
.book:hover,.book.hovered{transform:translateY(-10px) scale(1.035);filter:drop-shadow(0 10px 14px rgba(0,0,0,.42)) brightness(1.08)}
.book.dim{opacity:.22;filter:grayscale(.18) brightness(.8)}
.book.placeholder{cursor:default;opacity:.68;filter:brightness(.72) saturate(.75)}
.book.placeholder:hover{transform:none;filter:brightness(.72) saturate(.75)}
.book::after{
  content:"";position:absolute;inset:0;border-radius:8px;
  box-shadow:inset 0 0 0 1px rgba(255,224,170,.06);
}
.book-title{
  position:absolute;top:12px;bottom:28px;left:17px;right:12px;
  writing-mode:vertical-rl;text-orientation:mixed;
  font-family:"Noto Serif SC",serif;font-size:12px;font-weight:700;line-height:1.06;
  letter-spacing:.04em;color:#f7e7bf;text-shadow:0 1px 3px rgba(0,0,0,.55);
  overflow:hidden;
}
.book-pct{
  position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
  font-family:Georgia,serif;font-size:12px;font-weight:700;color:#f0cf76;
  text-shadow:0 1px 2px rgba(0,0,0,.55);
}
.book.done .book-pct{color:#9bdf6f}
.book.blocked .book-pct{color:#ff986f}
.book.not-started .book-pct{color:#ad9871}
.book .risk-mark{
  position:absolute;right:10px;top:10px;font-size:12px;color:#ffd36a;
  text-shadow:0 1px 2px rgba(0,0,0,.6)
}

.dep-svg{
  position:absolute;inset:0;pointer-events:none;z-index:7;
  opacity:0;transition:opacity .15s ease;
}

.hover-card{
  position:absolute;min-width:250px;max-width:320px;z-index:9;
  background:rgba(27,17,11,.94);border:1px solid rgba(216,165,93,.5);border-radius:14px;
  box-shadow:0 16px 32px rgba(0,0,0,.34), inset 0 0 0 1px rgba(255,221,160,.05);
  padding:14px 16px;color:#f0dfb5;pointer-events:none;display:none;
}
.hover-card .title{font-family:"Noto Serif SC",serif;font-size:18px;font-weight:700;color:#fff0cb;margin-bottom:6px}
.hover-card .meta{font-size:12px;color:#d6be8b;line-height:1.65}
.hover-card .deps{margin-top:8px;padding-top:8px;border-top:1px solid rgba(216,165,93,.22);font-size:12px;color:#c9b281;line-height:1.6}

.side{
  position:absolute;right:36px;top:124px;width:188px;z-index:6;
  display:flex;flex-direction:column;gap:14px;
}
.panel{
  background:var(--panel);border:1px solid var(--panel-border);border-radius:16px;
  box-shadow:var(--shadow);padding:14px 16px;
}
.panel h3{
  margin:0 0 10px 0;font-size:14px;color:#f4e4bf;font-family:"Noto Serif SC",serif;
  letter-spacing:.08em;
}
.add-btn,.action-btn{
  width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(216,165,93,.45);
  background:rgba(66,42,17,.7);color:#f5e3b8;cursor:pointer;
  font-family:"Noto Serif SC",serif;font-size:13px;letter-spacing:.06em;
}
.add-btn{background:linear-gradient(180deg,#556f3a 0%,#42582d 100%);border-color:rgba(146,213,105,.45)}
.add-btn:hover,.action-btn:hover{filter:brightness(1.08)}
.legend ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
.legend li{display:flex;align-items:center;gap:8px;font-size:12px;color:#d7c093}
.legend .dot{width:12px;height:12px;border-radius:4px;box-shadow:inset 0 1px 0 rgba(255,255,255,.15)}
.ow-actions{display:flex;gap:8px;margin-bottom:8px}
.ow-actions span{
  flex:1;text-align:center;padding:5px 6px;border-radius:8px;border:1px solid rgba(216,165,93,.28);
  color:#c9b281;font-size:11px;cursor:pointer;
}
.ow-actions span:hover{color:#fff0cb;border-color:rgba(240,199,129,.56)}
.ow-list{display:flex;flex-direction:column;gap:6px;max-height:230px;overflow:auto;padding-right:2px}
.ow-row{
  display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;
  font-size:12px;color:#dbc59b;background:rgba(255,255,255,.02);
}
.ow-row:hover{background:rgba(216,165,93,.1)}
.ow-row input{accent-color:#d8a55d}
.meta-row{font-size:11px;color:#b79f75;line-height:1.7}

.footer{
  position:absolute;left:290px;right:52px;bottom:22px;z-index:6;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
}
.footer .hint{
  font-family:"Noto Serif SC",serif;font-size:13px;color:#d8c190;letter-spacing:.08em
}
.footer-actions{display:flex;align-items:center;gap:10px}
.footer-actions .link-btn{
  padding:8px 12px;border-radius:10px;border:1px solid rgba(216,165,93,.32);
  background:rgba(26,15,8,.64);color:#e6d1a6;font-size:12px;cursor:pointer;
}
.footer-actions .link-btn:hover{filter:brightness(1.08)}

</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="header">
    <a class="back-link" href="./index.html">← 返回项目首页</a>
    <div class="title-wrap">
      <img class="title-plate" src="UX/resource/atoms/title_plate_transparent.png" alt=""/>
      <div class="title-text">事项大盘</div>
    </div>
    <div class="overall"><span class="lbl">整体进度</span><span class="pct" id="overallPct">—</span></div>
  </div>

  <div class="plaque-col" id="plaqueCol"></div>

  <div class="board" id="board">
    <div class="shelf-row" data-layer="vision" style="top:20px"></div>
    <div class="shelf-row" data-layer="design" style="top:159px"></div>
    <div class="shelf-row" data-layer="coordination" style="top:298px"></div>
    <div class="shelf-row" data-layer="implementation" style="top:437px"></div>
    <div class="shelf-row" data-layer="infrastructure" style="top:576px"></div>
    <svg class="dep-svg" id="depSvg"></svg>
    <div class="hover-card" id="hoverCard"></div>
  </div>

  <aside class="side">
    <div class="panel">
      <button class="add-btn" id="addBtn">+ 新增事项</button>
    </div>

    <div class="panel legend">
      <h3>进度图例</h3>
      <ul id="legendList"></ul>
    </div>

    <div class="panel">
      <h3>责任人筛选</h3>
      <div class="ow-actions"><span id="owAll">全选</span><span id="owNone">全不选</span></div>
      <div class="ow-list" id="ownerList"></div>
    </div>

    <div class="panel">
      <h3>数据状态</h3>
      <div class="meta-row" id="metaRow"></div>
    </div>
  </aside>

  <div class="footer">
    <span class="hint">点击书脊展开事项详情，悬停可查看依赖与摘要</span>
    <div class="footer-actions">
      <button class="link-btn" id="reportBtn">📋 今日日报</button>
      <button class="link-btn" id="openBtn">↥ 打开 JSON</button>
      <button class="link-btn" id="saveBtn">↓ 保存 JSON</button>
      <button class="link-btn" id="exportBtn">⇩ 导出副本</button>
    </div>
  </div>
</div>

<script type="module">
  import { Store, LAYERS, STATUSES, layerOf } from './js/store.js';
  import { openModal, toast } from './js/ui.js';
  import { openItemDrawer } from './js/itemDrawer.js';

  const STAGE_W = 1672;
  const STAGE_H = 941;
  const STAGE = document.getElementById('stage');
  const BOARD = document.getElementById('board');
  const DEP_SVG = document.getElementById('depSvg');
  const HOVER_CARD = document.getElementById('hoverCard');
  const SLOT_COUNT = 12;
  const BOOK_IMAGES = {
    done: ['UX/resource/dashboard/books/book-done-a.png', 'UX/resource/dashboard/books/book-done-b.png'],
    in_progress: ['UX/resource/dashboard/books/book-progress.png'],
    overdue: ['UX/resource/dashboard/books/book-progress.png'],
    blocked: ['UX/resource/dashboard/books/book-blocked.png'],
    not_started: ['UX/resource/dashboard/books/book-locked.png'],
    filler: ['UX/resource/dashboard/books/book-locked.png'],
  };
  const STATUS_PCT = {
    done: 100,
    in_progress: 60,
    overdue: 40,
    blocked: 25,
    not_started: 0,
  };
  const STATUS_TEXT = {
    done: '已完成',
    in_progress: '进行中',
    overdue: '延期',
    blocked: '阻塞',
    not_started: '未开始',
  };
  const STATUS_COLORS = {
    done: '#6aa84f',
    in_progress: '#c9a84e',
    overdue: '#d99449',
    blocked: '#c76652',
    not_started: '#72624c',
  };
  const PLAQUES = {
    vision: 'plaque_vision.png',
    design: 'plaque_design.png',
    coordination: 'plaque_coordination.png',
    implementation: 'plaque_implementation.png',
    infrastructure: 'plaque_infrastructure.png',
  };
  const filterState = { selected: new Set(Store.project.owners) };
  let hoveredId = null;
  let depHideTimer = 0;

  function resize() {
    const scale = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
    document.documentElement.style.setProperty('--scale', scale);
  }
  window.addEventListener('resize', resize);
  resize();

  document.addEventListener('keydown', (e) => {
    if (e.key === 'd' || e.key === 'D') document.body.classList.toggle('show-ref');
  });

  function pctOf(item) {
    if (typeof item.progress === 'number' && !Number.isNaN(item.progress)) return Math.max(0, Math.min(100, Math.round(item.progress)));
    return STATUS_PCT[item.status] ?? 0;
  }

  function bookImage(item, index) {
    const variants = BOOK_IMAGES[item.status] || BOOK_IMAGES.not_started;
    return variants[index % variants.length];
  }

  function bookWidth(item, filler = false) {
    if (filler) return 66;
    return Math.max(62, Math.min(86, 56 + item.effort * 4));
  }

  function bookHeight(item, filler = false) {
    if (filler) return 116;
    return Math.max(106, Math.min(126, 104 + item.effort * 2.2));
  }

  function upstreamOf(id) {
    return Store.items.filter(i => (i.dependencies || []).includes(id));
  }

  function renderLegend() {
    const legendList = document.getElementById('legendList');
    legendList.innerHTML = '';
    STATUSES.forEach(s => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="dot" style="background:${STATUS_COLORS[s.key]}"></span>${STATUS_TEXT[s.key]}`;
      legendList.appendChild(li);
    });
  }

  function renderPlaques() {
    const plaqueCol = document.getElementById('plaqueCol');
    plaqueCol.innerHTML = '';
    LAYERS.forEach(L => {
      const lp = Store.layerProgress(L.key);
      const div = document.createElement('div');
      div.className = 'plaque-item';
      div.dataset.layer = L.key;
      div.innerHTML = `
        <img class="plaque-bg" src="UX/resource/atoms/${PLAQUES[L.key].replace('.png', '_transparent.png')}" alt="${L.name}"/>
        <div class="pct">${lp.pct}%</div>
      `;
      div.addEventListener('mouseenter', () => activateLayer(L.key));
      div.addEventListener('mouseleave', () => activateLayer(null));
      div.addEventListener('click', () => {
        const first = Store.itemsByLayer(L.key)[0];
        if (first) location.href = `./detail.html?id=${encodeURIComponent(first.id)}`;
      });
      plaqueCol.appendChild(div);
    });
  }

  function renderOwners() {
    const ownerList = document.getElementById('ownerList');
    ownerList.innerHTML = '';
    Store.project.owners.forEach(o => {
      const row = document.createElement('label');
      row.className = 'ow-row';
      row.innerHTML = `<input type="checkbox" ${filterState.selected.has(o) ? 'checked' : ''}/><span>${o}</span>`;
      row.querySelector('input').onchange = (e) => {
        if (e.target.checked) filterState.selected.add(o);
        else filterState.selected.delete(o);
        applyDim();
      };
      ownerList.appendChild(row);
    });
  }

  function renderStats() {
    const ov = Store.overallProgress();
    document.getElementById('overallPct').textContent = ov.pct + '%';
    const fileLabel = Store.boundFileName()
      ? `文件：${Store.boundFileName()}`
      : (Store.fileSystemSupported() ? '文件：浏览器本地草稿' : '文件：仅支持下载副本');
    document.getElementById('metaRow').innerHTML =
      `总计 ${ov.count} 项 / ${ov.total} 人天<br/>${ov.doneCount} 项已完成<br/>${fileLabel}`;
  }

  function activateLayer(key) {
    document.querySelectorAll('.shelf-row').forEach(row => row.classList.toggle('active', row.dataset.layer === key));
    document.querySelectorAll('.plaque-item').forEach(item => item.classList.toggle('active', item.dataset.layer === key));
  }

  function createBook(item, index, filler = false) {
    const el = document.createElement('div');
    const w = bookWidth(item, filler);
    const h = bookHeight(item, filler);
    el.className = `book ${filler ? 'placeholder not-started' : item.status.replace('_', '-').replace('_', '-')}`;
    el.style.width = `${w}px`;
    el.style.height = `${h}px`;
    el.style.backgroundImage = `url("${filler ? BOOK_IMAGES.filler[0] : bookImage(item, index)}")`;
    if (filler) {
      el.innerHTML = `<div class="book-title">虚位待补</div>`;
      return el;
    }
    el.dataset.id = item.id;
    const pct = pctOf(item);
    el.innerHTML = `
      ${item.risk ? '<span class="risk-mark">⚠</span>' : ''}
      <div class="book-title">${item.title}</div>
      <div class="book-pct">${pct}%</div>
    `;
    el.addEventListener('mouseenter', () => {
      hoveredId = item.id;
      activateLayer(item.layer);
      document.querySelectorAll('.book.hovered').forEach(node => node.classList.remove('hovered'));
      el.classList.add('hovered');
      renderHoverCard(item, el);
      renderDeps();
    });
    el.addEventListener('mouseleave', () => {
      hoveredId = null;
      el.classList.remove('hovered');
      HOVER_CARD.style.display = 'none';
      activateLayer(null);
      renderDeps();
    });
    el.addEventListener('click', () => {
      location.href = `./detail.html?id=${encodeURIComponent(item.id)}`;
    });
    return el;
  }

  function renderShelves() {
    LAYERS.forEach(L => {
      const row = BOARD.querySelector(`.shelf-row[data-layer="${L.key}"]`);
      row.innerHTML = '';
      const items = Store.itemsByLayer(L.key);
      items.forEach((item, index) => row.appendChild(createBook(item, index, false)));
      const fillerCount = Math.max(0, SLOT_COUNT - items.length);
      for (let i = 0; i < fillerCount; i++) {
        row.appendChild(createBook({ status: 'not_started' }, i, true));
      }
    });
  }

  function applyDim() {
    document.querySelectorAll('.book[data-id]').forEach(book => {
      const item = Store.getItem(book.dataset.id);
      if (!item) return;
      const match = item.assignee && filterState.selected.has(item.assignee);
      book.classList.toggle('dim', filterState.selected.size === 0 ? true : !match);
    });
  }

  function centerOf(id) {
    const el = BOARD.querySelector(`.book[data-id="${id}"]`);
    if (!el) return null;
    const stageRect = STAGE.getBoundingClientRect();
    const rect = el.getBoundingClientRect();
    const boardRect = BOARD.getBoundingClientRect();
    return {
      x: rect.left + rect.width / 2 - boardRect.left,
      y: rect.top + rect.height / 2 - boardRect.top,
      stageX: rect.left + rect.width / 2 - stageRect.left,
      stageY: rect.top + rect.height / 2 - stageRect.top,
      width: rect.width,
      height: rect.height,
      boxLeft: rect.left - stageRect.left,
      boxTop: rect.top - stageRect.top,
    };
  }

  function drawLink(a, b) {
    const NS = 'http://www.w3.org/2000/svg';
    const path = document.createElementNS(NS, 'path');
    const midY = (a.y + b.y) / 2;
    path.setAttribute('d', `M${a.x},${a.y} C${a.x},${midY} ${b.x},${midY} ${b.x},${b.y}`);
    path.setAttribute('stroke', '#f0d498');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '.92');
    path.setAttribute('stroke-linecap', 'round');
    DEP_SVG.appendChild(path);
  }

  function renderDeps() {
    clearTimeout(depHideTimer);
    DEP_SVG.innerHTML = '';
    if (!hoveredId) {
      depHideTimer = setTimeout(() => { DEP_SVG.style.opacity = '0'; }, 180);
      return;
    }
    DEP_SVG.style.opacity = '1';
    const item = Store.getItem(hoveredId);
    if (!item) return;
    const c0 = centerOf(item.id);
    if (!c0) return;
    (item.dependencies || []).forEach(depId => {
      const c = centerOf(depId);
      if (c) drawLink(c, c0);
    });
    upstreamOf(item.id).forEach(dep => {
      const c = centerOf(dep.id);
      if (c) drawLink(c0, c);
    });
  }

  function renderHoverCard(item, sourceEl) {
    const source = centerOf(item.id);
    if (!source) return;
    const upstream = item.dependencies || [];
    const downstream = upstreamOf(item.id);
    HOVER_CARD.innerHTML = `
      <div class="title">${item.title}</div>
      <div class="meta">
        进度：${pctOf(item)}%<br/>
        状态：${STATUS_TEXT[item.status]}<br/>
        楼段：${layerOf(item.layer)?.name || item.layer}<br/>
        负责人：${item.assignee || '未分配'}<br/>
        工作量：${item.effort} 人天
      </div>
      <div class="deps">
        上游依赖：${upstream.length ? upstream.map(id => Store.getItem(id)?.title || '未知').join('、') : '无'}<br/>
        下游影响：${downstream.length ? downstream.map(i => i.title).join('、') : '无'}
      </div>
    `;
    const cardW = 286;
    const left = source.boxLeft + source.width / 2 + 18 > STAGE_W - cardW - 30
      ? source.boxLeft - cardW - 20
      : source.boxLeft + source.width + 18;
    const top = Math.max(120, Math.min(STAGE_H - 220, source.boxTop + source.height / 2 - 72));
    HOVER_CARD.style.left = `${left}px`;
    HOVER_CARD.style.top = `${top}px`;
    HOVER_CARD.style.display = 'block';
  }

  function fullRender() {
    renderLegend();
    renderPlaques();
    renderOwners();
    renderStats();
    renderShelves();
    applyDim();
    renderDeps();
  }

  document.getElementById('addBtn').onclick = () => openItemDrawer(null, () => fullRender(), { defaultLayer: 'implementation' });
  document.getElementById('owAll').onclick = () => {
    filterState.selected = new Set(Store.project.owners);
    renderOwners();
    applyDim();
  };
  document.getElementById('owNone').onclick = () => {
    filterState.selected = new Set();
    renderOwners();
    applyDim();
  };
  document.getElementById('openBtn').onclick = async () => {
    try {
      const loaded = await Store.openProjectFile();
      if (!loaded) return;
      hoveredId = null;
      fullRender();
      toast(`已打开 ${Store.boundFileName() || 'tower.json'}`, { type: 'success' });
    } catch (err) {
      console.error(err);
      toast(`打开失败：${err.message}`, { type: 'error' });
    }
  };
  document.getElementById('saveBtn').onclick = async () => {
    try {
      const result = await Store.saveProjectFile();
      if (!result) return;
      renderStats();
      toast(result.kind === 'file' ? `已保存到 ${result.name}` : `已下载 ${result.name}`, { type: 'success' });
    } catch (err) {
      console.error(err);
      toast(`保存失败：${err.message}`, { type: 'error' });
    }
  };
  document.getElementById('exportBtn').onclick = () => {
    const result = Store.downloadJson(Store.boundFileName() || 'tower.json');
    toast(`已导出副本 ${result.name}`, { type: 'success' });
  };
  document.getElementById('reportBtn').onclick = () => {
    const md = Store.buildDailyReport();
    openModal({
      title: '今日日报',
      width: 680,
      render: (body) => {
        body.innerHTML = `
          <textarea readonly style="width:100%;height:400px;font-family:monospace;font-size:12px;padding:12px;border:1px solid #b89868;background:#fffaf0;color:#3a2a1a;border-radius:6px;resize:vertical">${md}</textarea>
          <div style="margin-top:12px;text-align:right">
            <button id="copyBtn" style="padding:8px 16px;border:none;background:#5a7a3e;color:#f6ecd2;border-radius:6px;cursor:pointer">复制 Markdown</button>
          </div>
        `;
        body.querySelector('#copyBtn').onclick = () => {
          navigator.clipboard.writeText(md).then(() => toast('已复制', { type: 'success' }));
        };
      }
    });
  };

  Store.subscribe(() => fullRender());
  requestAnimationFrame(fullRender);
  if (new URLSearchParams(location.search).get('action') === 'add') {
    requestAnimationFrame(() => openItemDrawer(null, () => fullRender(), { defaultLayer: 'implementation' }));
  }
</script>
</body>
</html>
