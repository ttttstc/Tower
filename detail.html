<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Tower · 事项详情</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./tower-theme.css"/>
<style>
body{overflow:hidden}
.detail-left{
  position:absolute;left:44px;top:108px;width:262px;height:760px;z-index:5;
}
.detail-left .tower-scroll-body{
  display:flex;flex-direction:column;gap:16px;padding:40px 20px 26px;
}
.detail-nav{
  display:flex;flex-direction:column;gap:10px;margin-top:6px;
}
.detail-nav button{
  display:flex;align-items:center;gap:12px;width:100%;
  height:58px;padding:0 18px;border-radius:14px;
  border:1px solid rgba(175,135,74,.28);
  background:transparent;color:#50361b;cursor:pointer;
  font-family:"Noto Serif SC",serif;font-size:15px;font-weight:800;text-align:left;
  transition:all .15s ease;
}
.detail-nav button.active{
  background:linear-gradient(180deg, rgba(181,131,56,.88), rgba(134,92,34,.88));
  color:#fff1d2;box-shadow:0 10px 20px rgba(91,52,16,.18), inset 0 0 0 1px rgba(255,235,197,.16);
}
.detail-nav button:hover{transform:translateX(4px);filter:brightness(1.03)}
.detail-nav .icon{width:22px;text-align:center;font-size:20px}
.detail-side-painting{margin-top:auto;display:flex;justify-content:center}
.detail-side-painting img{width:136px;opacity:.68}

.detail-main{
  position:absolute;left:332px;top:104px;width:930px;height:770px;z-index:4;
  border-radius:28px;padding:42px 40px 34px;
}
.detail-main::before,
.detail-main::after{
  content:"";position:absolute;top:-10px;bottom:-10px;width:24px;
  background:linear-gradient(180deg,#b28f5c 0%,#7d5c34 10%,#d2b58a 22%,#87633c 50%,#cfb189 78%,#78552e 100%);
  border:1px solid rgba(96,57,18,.35);border-radius:999px;
  box-shadow:0 10px 20px rgba(0,0,0,.18);
}
.detail-main::before{left:-16px}
.detail-main::after{right:-16px}
.detail-paper-inner{
  position:relative;z-index:2;height:100%;overflow:auto;padding-right:10px;
}
.detail-head{
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
}
.detail-title{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.detail-title h2{
  margin:0;font-family:"Noto Serif SC",serif;font-size:36px;font-weight:900;letter-spacing:.05em;color:#3a2411;
}
.detail-sub{
  margin-top:8px;color:#6e5432;font-size:14px;line-height:1.8;
}
.detail-head-actions{display:flex;gap:10px;align-items:center}
.detail-head-actions .tower-btn{min-width:118px}

.overview-grid{
  display:grid;grid-template-columns:1.25fr .95fr;gap:22px;margin-top:18px;
}
.paper-slot{padding:20px 22px}
.paper-slot h4{
  margin:0 0 10px;font-family:"Noto Serif SC",serif;font-size:18px;color:#55361a;
}
.paper-slot p{margin:0;color:#6a5030;font-size:14px;line-height:1.9}

.steps-row{
  display:flex;align-items:stretch;gap:12px;overflow-x:auto;padding-bottom:4px;
}
.step-card{
  flex:0 0 126px;padding:16px 14px;border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.34), rgba(243,228,198,.18)), linear-gradient(180deg,#f7eedb 0%,#eddcb8 100%);
  border:1px solid rgba(185,141,78,.32);
  box-shadow:0 12px 20px rgba(0,0,0,.08), inset 0 0 0 1px rgba(255,247,226,.52);
  text-align:center;
}
.step-card.current{
  background:linear-gradient(180deg, rgba(132,124,66,.18), rgba(87,107,55,.08)), linear-gradient(180deg,#6d7f46 0%,#4c5e32 100%);
  color:#fff3d6;border-color:#4b5f31;
}
.step-card .title{font-family:"Noto Serif SC",serif;font-size:18px;font-weight:800;line-height:1.45}
.step-card .pct{margin-top:12px;font-family:Georgia,serif;font-size:30px;color:#7b5b29}
.step-card.current .pct{color:#fff4d8}
.step-card .state{margin-top:4px;font-size:14px}
.arrow-sep{
  display:flex;align-items:center;justify-content:center;width:24px;font-size:34px;color:#9c7338;flex:0 0 24px;
}

.dep-board{
  position:relative;height:240px;border-radius:20px;
}
.dep-board svg{
  position:absolute;inset:0;width:100%;height:100%;pointer-events:none;
}
.dep-node{
  position:absolute;display:flex;align-items:center;justify-content:center;text-align:center;
  min-width:154px;min-height:56px;padding:10px 16px;border-radius:14px;
  background:rgba(255,251,241,.62);border:1px solid rgba(185,141,78,.34);
  box-shadow:0 10px 18px rgba(0,0,0,.06), inset 0 0 0 1px rgba(255,247,226,.48);
  font-family:"Noto Serif SC",serif;color:#52351a;line-height:1.55;
}
.dep-node.center{
  background:linear-gradient(180deg, rgba(132,124,66,.18), rgba(87,107,55,.08)), linear-gradient(180deg,#6d7f46 0%,#4c5e32 100%);
  color:#fff1d3;border-color:#4e6134;
}
.dep-node small{display:block;font-family:"Noto Sans SC",sans-serif;font-size:12px;color:inherit;opacity:.9}

.timeline{
  position:relative;padding:8px 2px 12px;
}
.timeline-line{
  position:absolute;left:22px;right:22px;top:32px;height:2px;background:linear-gradient(90deg, rgba(160,116,51,.5), rgba(160,116,51,.18));
}
.timeline-grid{
  position:relative;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;
}
.timeline-item{
  position:relative;padding-top:24px;color:#6d5433;font-size:13px;line-height:1.7;
}
.timeline-item::before{
  content:"";position:absolute;top:24px;left:0;width:11px;height:11px;border-radius:50%;
  background:#fff4de;border:2px solid #9c7338;box-shadow:0 0 0 4px rgba(255,252,244,.52);
}
.timeline-item.active::before{background:#b8812d}
.timeline-date{font-family:Georgia,serif;font-size:18px;color:#66441e}
.timeline-title{margin-top:10px;font-family:"Noto Serif SC",serif;font-size:15px;font-weight:700;color:#4a3018}

.detail-side{
  position:absolute;right:46px;top:110px;width:290px;height:754px;z-index:5;
  display:flex;flex-direction:column;gap:14px;
}
.ring-card{padding:18px 18px 16px}
.ring{
  width:152px;height:152px;margin:10px auto 12px;border-radius:50%;
  display:grid;place-items:center;
  background:conic-gradient(var(--tower-green) 0deg, var(--tower-green) 0deg, rgba(190,160,112,.28) 0deg);
}
.ring::after{
  content:"";width:114px;height:114px;border-radius:50%;
  background:linear-gradient(180deg,#f9f0dd 0%,#f0e0bc 100%);
  border:1px solid rgba(185,141,78,.24);
}
.ring-value{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  text-align:center;font-family:"Noto Serif SC",serif;
}
.ring-value strong{display:block;font-size:28px;color:#4f3416}
.ring-value span{font-size:14px;color:#6b512f}
.side-card-body{position:relative;z-index:2}
.owner-row{display:flex;gap:12px;align-items:center}
.owner-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(180deg,#ceb078 0%,#9d7239 100%);
  display:grid;place-items:center;color:#fff3d9;font-size:20px;
}
.priority-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 12px}
.priority-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px dashed rgba(185,141,78,.24);color:#6c512e;font-size:13px;
}
.priority-dot{
  width:12px;height:12px;border-radius:50%;
}

.empty-state{
  display:flex;align-items:center;justify-content:center;height:100%;
  font-family:"Noto Serif SC",serif;font-size:22px;color:#7a633d;
}
</style>
</head>
<body class="tower-body">
<div class="tower-stage tower-wood-bg" id="stage">
  <div class="tower-ambient">
    <img class="tower-lantern left" src="./UX/resource/atoms/tassel.png" alt=""/>
    <img class="tower-lantern right" src="./UX/resource/atoms/tassel.png" alt=""/>
  </div>

  <div class="tower-topbar">
    <a class="tower-link-chip" id="backBtn" href="./dashboard.html">← 返回大盘</a>
    <div class="tower-title-plaque">
      <img src="./UX/resource/atoms/title_plate_transparent.png" alt=""/>
      <h1>事项详情</h1>
    </div>
    <a class="tower-link-chip" id="layerBtn" href="./dashboard.html">查看所属层</a>
  </div>

  <aside class="tower-scroll detail-left">
    <div class="tower-scroll-body">
      <div class="tower-mini-title">卷轴索引</div>
      <div class="detail-nav" id="detailNav"></div>
      <div class="detail-side-painting">
        <img src="./UX/resource/atoms/pagoda_painting.png" alt=""/>
      </div>
    </div>
  </aside>

  <main class="tower-paper detail-main" id="detailMain">
    <div class="detail-paper-inner" id="detailPaper"></div>
  </main>

  <aside class="detail-side" id="detailSide"></aside>
</div>
<div class="tower-hud">点击左侧卷轴跳转章节</div>

<script type="module">
import { Store, layerOf, LAYERS } from './js/store.js';
import { toast } from './js/ui.js';

const STAGE_W = 1672;
const STAGE_H = 941;
const STATUS_PCT = { done: 100, in_progress: 60, overdue: 40, blocked: 25, not_started: 0 };
const STATUS_TEXT = { done: '已完成', in_progress: '进行中', overdue: '延期', blocked: '阻塞', not_started: '未开始' };
const LAYER_PHASES = {
  vision: ['北极星界定', '价值假设', '关键约束', '业务目标', '阶段验收'],
  design: ['交互草模', '信息结构', '视觉样式', '组件沉淀', '走查收口'],
  coordination: ['接口设计', '数据模型', '状态管理', '数据校验', '评审归档'],
  implementation: ['任务切分', '模块搭建', '联调验证', '异常处理', '上线准备'],
  infrastructure: ['底座准备', '资源接入', '监控告警', '灰度验证', '运营移交'],
};
const SECTION_META = [
  { id: 'overview', icon: '📖', label: '概述' },
  { id: 'breakdown', icon: '🧩', label: '任务拆解' },
  { id: 'deps', icon: '🕸', label: '依赖关系' },
  { id: 'logs', icon: '🕰', label: '进度日志' },
  { id: 'risk', icon: '⚠', label: '风险记录' },
  { id: 'resource', icon: '👤', label: '资源 / 人员' },
];

function resize() {
  const scale = Math.min(window.innerWidth / STAGE_W, window.innerHeight / STAGE_H);
  document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', resize);
resize();

const params = new URLSearchParams(location.search);
const fallback = Store.items[0];
const itemId = params.get('id') || fallback?.id || '';
const item = Store.getItem(itemId) || fallback;

if (!item) {
  document.getElementById('detailPaper').innerHTML = '<div class="empty-state">暂无事项，先去新增一个吧</div>';
  document.getElementById('detailSide').innerHTML = '';
  throw new Error('No item found');
}

document.title = `Tower · ${item.title}`;

const layer = layerOf(item.layer);
document.getElementById('backBtn').href = `./dashboard.html${item.layer ? `?layer=${item.layer}` : ''}`;
document.getElementById('layerBtn').href = `./dashboard.html${item.layer ? `?layer=${item.layer}` : ''}`;

function pctOf(target) {
  if (typeof target.progress === 'number' && !Number.isNaN(target.progress)) return Math.max(0, Math.min(100, Math.round(target.progress)));
  return STATUS_PCT[target.status] ?? 0;
}
function statusText(target) { return STATUS_TEXT[target.status] || target.status; }
function upstreamOf(id) { return Store.items.filter(entry => (entry.dependencies || []).includes(id)); }
function formatDate(value) { return new Date(value).toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' }); }
function badgeClass(status) {
  if (status === 'in_progress') return 'in-progress';
  return status.replace('_', '-');
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
}

function buildNarrative(target) {
  if (target.notes) return target.notes;
  const layerName = layer?.name || target.layer;
  return `本事项位于${layerName}，当前由 ${target.assignee || '项目组'} 持续推进，围绕「${target.title}」完成关键结构、协同约束与落地衔接。页面中的任务拆解、依赖关系和进度日志均由当前项目数据实时推导。`;
}

function buildStepDeck(target) {
  const phases = [...(LAYER_PHASES[target.layer] || LAYER_PHASES.implementation)];
  const depTitles = (target.dependencies || []).map((depId) => Store.getItem(depId)?.title).filter(Boolean);
  if (depTitles.length) phases.splice(0, depTitles.length, ...depTitles.slice(0, 2));
  phases[Math.min(2, phases.length - 1)] = target.title;
  const currentIndex = Math.round((pctOf(target) / 100) * (phases.length - 1));
  return phases.slice(0, 5).map((title, index) => {
    let status = 'not_started';
    if (index < currentIndex) status = 'done';
    if (index === currentIndex) status = target.status;
    if (currentIndex === 0 && index === 0) status = target.status;
    return { title, status, pct: status === target.status ? pctOf(target) : (status === 'done' ? 100 : 0), current: title === target.title };
  });
}

function buildTimeline(target) {
  const start = new Date(target.createdAt);
  const updated = new Date(target.updatedAt);
  const base = [
    { date: new Date(start), title: '事项创建', note: '在项目塔中登记本事项并确认范围', active: true },
    { date: new Date(start.getTime() + 2 * 86400000), title: '范围确认', note: `明确 ${target.title} 的边界与依赖`, active: pctOf(target) >= 25 },
    { date: new Date(start.getTime() + 5 * 86400000), title: '方案推进', note: `${statusText(target)}，责任人开始执行`, active: pctOf(target) >= 40 },
    { date: new Date(updated), title: '最近更新', note: '同步当前状态、备注与依赖关系', active: true },
    { date: new Date(updated.getTime() + 2 * 86400000), title: '下一里程碑', note: target.status === 'done' ? '当前事项已收口归档' : '等待完成联调与验收', active: target.status === 'done' },
  ];
  return base;
}

function buildDepGraph(target) {
  const upstream = (target.dependencies || []).map((id) => Store.getItem(id)).filter(Boolean).slice(0, 3);
  const downstream = upstreamOf(target.id).slice(0, 3);
  return { upstream, downstream };
}

function renderSections() {
  const deck = buildStepDeck(item);
  const graph = buildDepGraph(item);
  const timeline = buildTimeline(item);
  const progressPct = pctOf(item);
  const narrative = buildNarrative(item);
  const depSummary = graph.upstream.length
    ? graph.upstream.map((entry) => entry.title).join('、')
    : '当前事项暂无上游依赖，可独立推进。';
  const downSummary = graph.downstream.length
    ? graph.downstream.map((entry) => entry.title).join('、')
    : '当前事项暂无已登记的下游承接事项。';

  const html = `
    <section id="overview" data-anchor>
      <div class="detail-head">
        <div>
          <div class="detail-title">
            <h2>${escapeHtml(item.title)}</h2>
            <span class="tower-badge ${badgeClass(item.status)}">${statusText(item)}</span>
          </div>
          <div class="detail-sub">
            ${escapeHtml(layer?.name || item.layer)} / ${escapeHtml(item.assignee || '未分配负责人')} / ${item.effort} 人天 / 当前进度 ${progressPct}%
          </div>
        </div>
        <div class="detail-head-actions">
          <button class="tower-btn secondary" id="jumpEditBtn">编辑事项</button>
          <button class="tower-btn ghost" id="jumpBoardBtn">返回层视图</button>
        </div>
      </div>

      <div class="overview-grid">
        <div class="tower-paper-card paper-slot">
          <h4>事项说明</h4>
          <p>${escapeHtml(narrative)}</p>
        </div>
        <div class="tower-paper-card paper-slot">
          <h4>推进摘要</h4>
          <p>上游依赖：${escapeHtml(depSummary)}</p>
          <p>下游承接：${escapeHtml(downSummary)}</p>
          <p>最近更新：${escapeHtml(new Date(item.updatedAt).toLocaleString('zh-CN'))}</p>
        </div>
      </div>
    </section>

    <div class="tower-divider"></div>

    <section id="breakdown" data-anchor>
      <div class="tower-section-title">任务拆解</div>
      <div style="height:16px"></div>
      <div class="steps-row">
        ${deck.map((step, index) => `
          ${index ? '<div class="arrow-sep">→</div>' : ''}
          <article class="step-card ${step.current ? 'current' : ''}">
            <div class="title">${escapeHtml(step.title)}</div>
            <div class="pct">${step.pct}%</div>
            <div class="state">${escapeHtml(statusText(step))}</div>
          </article>
        `).join('')}
      </div>
    </section>

    <div class="tower-divider"></div>

    <section id="deps" data-anchor>
      <div class="tower-section-title">依赖关系</div>
      <div style="height:14px"></div>
      <div class="tower-paper-card dep-board" id="depBoard"></div>
    </section>

    <div class="tower-divider"></div>

    <section id="logs" data-anchor>
      <div class="tower-section-title">进度日志</div>
      <div style="height:10px"></div>
      <div class="timeline">
        <div class="timeline-line"></div>
        <div class="timeline-grid">
          ${timeline.map((entry) => `
            <div class="timeline-item ${entry.active ? 'active' : ''}">
              <div class="timeline-date">${escapeHtml(formatDate(entry.date))}</div>
              <div class="timeline-title">${escapeHtml(entry.title)}</div>
              <div>${escapeHtml(entry.note)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </section>

    <div class="tower-divider"></div>

    <section id="risk" data-anchor>
      <div class="tower-section-title">风险记录</div>
      <div style="height:14px"></div>
      <div class="overview-grid" style="grid-template-columns:1fr 1fr">
        <div class="tower-paper-card paper-slot">
          <h4>当前风险</h4>
          <p>${item.risk ? '已被标记为风险事项，建议优先确认阻塞原因、资源牵引与解除条件。' : '当前未显式标记风险，但仍建议在关键依赖未闭环前保持同步。'}</p>
        </div>
        <div class="tower-paper-card paper-slot">
          <h4>建议动作</h4>
          <p>${graph.upstream.length ? '优先催收上游依赖的状态反馈，并在大盘中保持联动说明。' : '当前可继续向下推进，必要时补充说明与负责人。'}</p>
        </div>
      </div>
    </section>

    <div class="tower-divider"></div>

    <section id="resource" data-anchor>
      <div class="tower-section-title">资源 / 人员</div>
      <div style="height:14px"></div>
      <div class="overview-grid" style="grid-template-columns:1fr 1fr">
        <div class="tower-paper-card paper-slot">
          <h4>责任人</h4>
          <p>当前主责：${escapeHtml(item.assignee || '未分配')}</p>
          <p>关联楼层：${escapeHtml(layer?.name || item.layer)}</p>
          <p>工作量：${item.effort} 人天</p>
        </div>
        <div class="tower-paper-card paper-slot">
          <h4>协同建议</h4>
          <p>建议在推进中同步关注 ${graph.downstream.length ? '下游承接事项' : '潜在联动模块'}，必要时补充更多依赖与说明，避免仅在抽屉中编辑而缺少上下文。</p>
        </div>
      </div>
    </section>
  `;

  const paper = document.getElementById('detailPaper');
  paper.innerHTML = html;
  document.getElementById('jumpEditBtn').onclick = () => {
    location.href = `./item-form.html?id=${encodeURIComponent(item.id)}`;
  };
  document.getElementById('jumpBoardBtn').onclick = () => {
    location.href = `./dashboard.html?layer=${encodeURIComponent(item.layer)}`;
  };
  renderDepBoard(graph);
}

function renderDepBoard(graph) {
  const board = document.getElementById('depBoard');
  if (!board) return;
  board.innerHTML = '<svg viewBox="0 0 760 240" preserveAspectRatio="none"></svg>';
  const svg = board.querySelector('svg');
  const center = { left: 300, top: 88, width: 160, height: 64 };
  const leftPositions = [32, 102, 172];
  const rightPositions = [32, 102, 172];

  const centerNode = document.createElement('div');
  centerNode.className = 'dep-node center';
  centerNode.style.left = `${center.left}px`;
  centerNode.style.top = `${center.top}px`;
  centerNode.style.width = `${center.width}px`;
  centerNode.style.height = `${center.height}px`;
  centerNode.innerHTML = `${escapeHtml(item.title)}<small>${statusText(item)} · ${pctOf(item)}%</small>`;
  board.appendChild(centerNode);

  function createNode(entry, side, top) {
    const node = document.createElement('div');
    node.className = 'dep-node';
    node.style.left = side === 'left' ? '28px' : '560px';
    node.style.top = `${top}px`;
    node.style.width = '154px';
    node.innerHTML = `${escapeHtml(entry.title)}<small>${statusText(entry)} · ${pctOf(entry)}%</small>`;
    board.appendChild(node);
    return { x: side === 'left' ? 182 : 560, y: top + 28, side };
  }

  const leftNodes = graph.upstream.length ? graph.upstream : [{ title: '暂无上游事项', status: 'not_started' }];
  const rightNodes = graph.downstream.length ? graph.downstream : [{ title: '暂无下游事项', status: 'not_started' }];

  leftNodes.forEach((entry, index) => {
    const point = createNode(entry, 'left', leftPositions[index] ?? leftPositions[leftPositions.length - 1]);
    drawCurve(svg, point.x, point.y, center.left, center.top + center.height / 2, '#8a6735');
  });
  rightNodes.forEach((entry, index) => {
    const point = createNode(entry, 'right', rightPositions[index] ?? rightPositions[rightPositions.length - 1]);
    drawCurve(svg, center.left + center.width, center.top + center.height / 2, point.x, point.y, '#8a6735');
  });
}

function drawCurve(svg, x1, y1, x2, y2, color) {
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const mid = (x1 + x2) / 2;
  path.setAttribute('d', `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '2.2');
  path.setAttribute('stroke-linecap', 'round');
  svg.appendChild(path);
}

  const lp = Store.layerProgress(item.layer);
  const owner = item.assignee || '未分配';

    <section class="tower-paper tower-side-card ring-card">
      <div class="side-card-body">
        <div class="tower-mini-title">整体进度</div>
        <div style="position:relative">
          <div class="ring" id="detailRing"></div>
          <div class="ring-value"><strong>${progressPct}%</strong><span>${statusText(item)}</span></div>
        </div>
        <div class="tower-meta" style="text-align:center">${progressPct >= 100 ? '已完成归档' : `${lp.done}/${lp.count} 个同层事项完成`}</div>
      </div>
    </section>

    <section class="tower-paper tower-side-card">
      <div class="side-card-body">

        <div class="tower-meta" style="margin-top:10px">
          本塔 · ${escapeHtml(layer?.name || item.layer)}<br/>
          项目名称 · ${escapeHtml(Store.project.name)}<br/>
          更新于 · ${escapeHtml(new Date(item.updatedAt).toLocaleString('zh-CN'))}
        </div>
        <img src="./UX/resource/atoms/pagoda_painting.png" alt="" style="display:block;width:150px;margin:18px auto 0;opacity:.85"/>
      </div>
    </section>

    <section class="tower-paper tower-side-card">
      <div class="side-card-body">
        <div class="tower-mini-title">负责人</div>
        <div class="owner-row" style="margin-top:12px">
          <div class="owner-avatar">匠</div>
          <div>
            <div style="font-family:'Noto Serif SC',serif;font-size:22px;color:#4e3419">${escapeHtml(owner)}</div>
            <div class="tower-meta">${item.risk ? '当前风险责任人' : '当前主责人'}</div>
          </div>
        </div>
      </div>
    </section>

    <section class="tower-paper tower-side-card">
      <div class="side-card-body">
        <div class="tower-mini-title">优先级与复杂度</div>
        <div class="priority-grid" style="margin-top:10px">
          <div class="priority-item"><span>优先级</span><span style="display:flex;align-items:center;gap:8px"><i class="priority-dot" style="background:${item.risk ? '#af4b2d' : '#b27b2d'}"></i>${item.risk ? '高' : progressPct >= 60 ? '中' : '高'}</span></div>
          <div class="priority-item"><span>复杂度</span><span style="display:flex;align-items:center;gap:8px"><i class="priority-dot" style="background:${item.effort >= 5 ? '#af4b2d' : '#b27b2d'}"></i>${item.effort >= 7 ? '高' : item.effort >= 4 ? '中' : '低'}</span></div>
          <div class="priority-item"><span>工作量</span><span>${item.effort} 人天</span></div>
          <div class="priority-item"><span>依赖数</span><span>${item.dependencies?.length || 0}</span></div>
        </div>
      </div>
    </section>
  `;

  const ring = document.getElementById('detailRing');
  const degree = Math.round((progressPct / 100) * 360);
  ring.style.background = `conic-gradient(var(--tower-green) 0deg ${degree}deg, rgba(190,160,112,.28) ${degree}deg 360deg)`;
}

function renderNav() {
  const nav = document.getElementById('detailNav');
  nav.innerHTML = SECTION_META.map((section, index) => `
    <button type="button" data-target="${section.id}" class="${index === 0 ? 'active' : ''}">
      <span class="icon">${section.icon}</span><span>${section.label}</span>
    </button>
  `).join('');

  const paper = document.getElementById('detailPaper');
  const buttons = [...nav.querySelectorAll('button')];
  const anchors = [...paper.querySelectorAll('[data-anchor]')];

  function syncActive() {
    const top = paper.scrollTop + 40;
    let activeId = anchors[0]?.id;
    anchors.forEach((anchor) => {
      if (anchor.offsetTop <= top) activeId = anchor.id;
    });
    buttons.forEach((button) => button.classList.toggle('active', button.dataset.target === activeId));
  }

  buttons.forEach((button) => {
    button.onclick = () => {
      const target = document.getElementById(button.dataset.target);
      if (!target) return;
      paper.scrollTo({ top: target.offsetTop - 14, behavior: 'smooth' });
      syncActive();
    };
  });
  paper.addEventListener('scroll', syncActive);
  syncActive();
}

renderSections();
renderSide();
renderNav();

window.addEventListener('keydown', (event) => {
  if (event.key === 'e' || event.key === 'E') {
    location.href = `./item-form.html?id=${encodeURIComponent(item.id)}`;
  }
});
</script>
