<style>
/* ─────────────────────────────────────────────────────────────
   Tower Design System — tokens
   Extracted from ttttstc/Tower @ main : UX/tower.jsx + DESIGN.md
   All values are warm (no cool blues/purples, A2 hygiene).
   ───────────────────────────────────────────────────────────── */

/* Fonts: substituted from Google Fonts. Flagged in README. */
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Geist:wght@400;500;600;700&display=swap');

:root {
  /* ── Surfaces (warm creams) ──────────────────────────── */
  --bg-page-start: #f8f4ec;           /* radial center */
  --bg-page-end:   #e8e0d0;            /* radial edge   */
  --bg-panel:      #f8f4ec;            /* side panel, drawer */
  --bg-surface:    #ffffff;            /* inputs, list rows */
  --bg-floor-idle: rgba(244,238,228,0.5);
  --bg-floor-gold: linear-gradient(180deg, rgba(107,124,78,0.18), rgba(107,124,78,0.08));
  --bg-foundation: repeating-linear-gradient(90deg, #c4b99e 0 18px, #d4c8b0 18px 20px);

  /* ── Foreground (warm inks) ──────────────────────────── */
  --fg-1: #3d3528;    /* primary text, project name */
  --fg-2: #5a5040;    /* body text */
  --fg-3: #7a6e5d;    /* secondary, button text */
  --fg-4: #9a8e7a;    /* labels, eyebrows, meta */
  --fg-5: #b5a88e;    /* muted, placeholders, hairlines strong */

  /* ── Borders (warm tans) ─────────────────────────────── */
  --border-strong:  #b5a88e;
  --border-default: #d4c8b0;
  --border-muted:   #e4ddd0;
  --border-eave:    #b5a88e;
  --border-wood:    #c4b99e;

  /* ── Status colors (5 states, 5 warm hues) ───────────── */
  --status-done:        #6b7c4e;  /* olive green   */
  --status-done-grad:   linear-gradient(135deg, #8a9a5e, #6b7c4e);
  --status-in-progress: #c17832;  /* amber / brick */
  --status-not-started: #a89f91;  /* warm gray     */
  --status-overdue:     #c9a832;  /* saffron       */
  --status-blocked:     #b5453a;  /* brick red     */

  /* ── Accent (used sparingly) ─────────────────────────── */
  --spire-grad: linear-gradient(180deg, #c9a832 0%, #8a7a45 100%);
  --gold-metal: #c9a832;
  --gold-deep:  #8a7a45;

  /* ── Type system ─────────────────────────────────────── */
  --font-display: 'Fraunces', Georgia, 'Noto Serif SC', serif;
  --font-body:    'Geist', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-numeric: Georgia, 'Times New Roman', serif;

  /* Type scale — calibrated to 14" laptop as source */
  --text-xxs: 7.5px;    /* eyebrow TOWER        */
  --text-xs:  8px;      /* micro labels         */
  --text-2xs: 9px;      /* badges, chips        */
  --text-sm:  9.5px;    /* body small, meta     */
  --text-md:  10px;     /* body default         */
  --text-lg:  11px;     /* buttons, emphasized  */
  --text-xl:  12px;     /* inline numerics      */
  --text-h3:  13px;     /* numerics large       */
  --text-h2:  14px;     /* modal titles         */
  --text-h1:  15px;     /* drawer titles        */
  --text-display: 18px; /* project name         */

  /* Weights */
  --fw-400: 400;
  --fw-500: 500;
  --fw-600: 600;
  --fw-700: 700;
  --fw-800: 800;

  /* Letter spacing */
  --ls-eyebrow: 0.22em;
  --ls-label:   0.1em;
  --ls-caps:    0.06em;
  --ls-button:  0.04em;

  /* Line height */
  --lh-tight: 1.2;
  --lh-snug:  1.3;
  --lh-body:  1.4;
  --lh-relaxed: 1.7;

  /* ── Spacing ─────────────────────────────────────────── */
  --gap-brick: 1px;      /* the grout between bricks — inviolable */
  --space-1:  2px;
  --space-2:  3px;
  --space-3:  4px;
  --space-4:  6px;
  --space-5:  8px;
  --space-6:  10px;
  --space-7:  14px;
  --space-8:  18px;
  --space-9:  20px;

  /* ── Radii ───────────────────────────────────────────── */
  --r-0:   0;
  --r-brick: 2px;       /* bricks              */
  --r-chip:  2px;       /* chips, swatches     */
  --r-input: 3px;       /* inputs, small btns  */
  --r-panel: 4px;       /* buttons, containers */
  --r-modal: 6px;       /* modal surfaces      */
  --r-card:  10px;      /* report modal (max)  */

  /* ── Elevation — NO drop shadows on layout surfaces ──── */
  --ring-hover: 0 0 0 1.5px currentColor;
  --glow-hover: 0 2px 8px rgba(107,124,78,0.19);   /* ≤12% of brick color */
  --shadow-cta: 0 1px 2px rgba(107,124,78,0.25);   /* only on primary CTA */
  --scrim:      rgba(0,0,0,0.10);
  --scrim-modal: rgba(0,0,0,0.20);
  --backdrop-blur: blur(4px);                      /* only on report modal */

  /* ── Motion ──────────────────────────────────────────── */
  --dur-hover: 180ms;
  --dur-dep-in:  150ms;
  --dur-dep-out: 200ms;
  --dur-drawer: 240ms;
  --ease-hover: ease;
  --ease-drawer: cubic-bezier(0.16, 1, 0.3, 1);     /* ease-out-expo */
  --spring-stiffness: 0.12;
  --spring-damping:   0.78;

  /* ── Widths ──────────────────────────────────────────── */
  --tower-base:  420px;
  --tower-step:  16px;    /* ui = base − 16 */
  --sidepanel-w: 160px;
  --drawer-w:    360px;
  --modal-w-max: 480px;
  --foundation-overhang: 50px; /* wider than base storey */
}

/* ─────────────────────────────────────────────────────────────
   Semantic element styles
   ───────────────────────────────────────────────────────────── */

html, body {
  background: radial-gradient(ellipse at 50% 20%, var(--bg-page-start) 0%, var(--bg-page-end) 100%);
  color: var(--fg-1);
  font-family: var(--font-body);
  font-size: var(--text-md);
  line-height: var(--lh-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  margin: 0;
}

/* Project / modal title */
h1, .ds-display {
  font-family: var(--font-display);
  font-size: var(--text-display);
  font-weight: var(--fw-700);
  color: var(--fg-1);
  line-height: var(--lh-snug);
  letter-spacing: 0;
  margin: 0;
}

h2, .ds-h2 {
  font-family: var(--font-display);
  font-size: var(--text-h2);
  font-weight: var(--fw-700);
  color: var(--fg-1);
  margin: 0;
}

h3, .ds-h3 {
  font-family: var(--font-display);
  font-size: var(--text-h1);
  font-weight: var(--fw-700);
  color: var(--fg-1);
  margin: 0;
}

/* Eyebrow — ALL-CAPS micro-label */
.ds-eyebrow {
  font-family: var(--font-body);
  font-size: var(--text-xxs);
  font-weight: var(--fw-800);
  color: var(--fg-5);
  letter-spacing: var(--ls-eyebrow);
  text-transform: uppercase;
}

.ds-label {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: var(--fw-700);
  color: var(--fg-4);
  letter-spacing: var(--ls-caps);
  text-transform: uppercase;
}

p, .ds-body {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--fg-4);
  line-height: var(--lh-body);
  margin: 0;
}

.ds-meta {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  color: var(--fg-5);
}

.ds-numeric {
  font-family: var(--font-numeric);
  font-weight: var(--fw-700);
  color: var(--fg-2);
}

code, pre, .ds-mono {
  font-family: Georgia, 'Times New Roman', serif; /* Tower has no mono — uses serif Georgia for report blocks */
  font-size: var(--text-sm);
  color: var(--fg-2);
  background: var(--bg-surface);
  border: 1px solid var(--border-muted);
  border-radius: var(--r-modal);
  padding: var(--space-7);
  line-height: var(--lh-relaxed);
  white-space: pre-wrap;
}

/* Buttons — primary CTA (olive), secondary (tan outline), ghost */
.ds-btn {
  font-family: var(--font-body);
  font-size: var(--text-lg);
  font-weight: var(--fw-700);
  letter-spacing: var(--ls-button);
  border-radius: var(--r-panel);
  padding: 7px 14px;
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  color: var(--fg-3);
  cursor: pointer;
  transition: background var(--dur-hover) var(--ease-hover), color var(--dur-hover) var(--ease-hover);
}
.ds-btn--primary {
  background: var(--status-done);
  color: #fff;
  border: none;
  box-shadow: var(--shadow-cta);
}
.ds-btn--primary:hover { background: #5e6e43; }
.ds-btn--danger {
  background: var(--status-blocked);
  color: #fff;
  border: none;
}
.ds-btn--ghost {
  background: transparent;
  border: 1px dashed var(--border-default);
  color: var(--fg-3);
}

/* Inputs */
.ds-input {
  width: 100%;
  padding: 6px 8px;
  border-radius: var(--r-input);
  border: 1px solid var(--border-default);
  background: var(--bg-surface);
  font-size: var(--text-lg);
  color: var(--fg-1);
  font-family: inherit;
  outline: none;
}

/* Brick — the atomic unit */
.ds-brick {
  border-radius: var(--r-brick);
  color: rgba(255,255,255,0.88);
  text-shadow: 0 1px 2px rgba(0,0,0,0.25);
  font-size: var(--text-2xs);
  font-weight: var(--fw-600);
  /* NEVER animate width/height/transform on hover — only opacity/outline/box-shadow */
  transition: opacity var(--dur-hover) var(--ease-hover), box-shadow var(--dur-hover) var(--ease-hover);
}

/* Horizontal Treemap — row-based layout, all bricks are wider than tall */
function squarify(items, rect) {
  if (!items.length) return [];
  const total = items.reduce((s,it)=>s+it.effort,0);
  if (total===0) return items.map(it=>({...it,bx:rect.x,by:rect.y,bw:0,bh:0}));

  // Sort by effort descending so large items get prime positions
  const sorted=[...items].sort((a,b)=>b.effort-a.effort);

  // Layout parameters: each row fills full width, fixed height
  // Target: bricks ~1.5× to 2× wider than tall (horizontal rectangles)
  const MIN_BRICKS_PER_ROW = 2;
  const MAX_ROW_ASPECT = 2.2; // max width/height ratio per row

  // Adaptive row height: try to make each row ~half as tall as wide
  const targetRowH = rect.w / MAX_ROW_ASPECT;
  const rowH = Math.max(20, Math.min(targetRowH, rect.h / 3));

  const result = [];
  let cy = rect.y;
  let rem = [...sorted];

  while(rem.length > 0 && cy < rect.y + rect.h){
    const availH = rect.y + rect.h - cy;
    const curRowH = Math.min(rowH, availH);

    // Determine how many items fit in this row:
    // Take items greedily until adding another would make row too tall relative to width
    // We compute row "aspect" as: totalRowWidth / curRowH
    // For horizontal bricks: we want rowWidth >> curRowH
    const row = [];
    let rowEffort = 0;
    let i = 0;

    while(i < rem.length){
      const test = [...row, rem[i]];
      const testEffort = rowEffort + rem[i].effort;
      // Simulate: totalWidth = (testEffort/total)*rect.w, height = curRowH
      // Aspect = width/height = (testEffort/total)*rect.w / curRowH
      // We want aspect <= MAX_ROW_ASPECT
      const simAspect = (testEffort / total) * rect.w / curRowH;
      if(simAspect <= MAX_ROW_ASPECT || row.length < MIN_BRICKS_PER_ROW){
        row.push(rem[i]);
        rowEffort = testEffort;
        i++;
      }else break;
    }

    // Layout this row: full width, height = curRowH, bricks proportional to effort
    let cx = rect.x;
    for(const it of row){
      const bw = (it.effort / rowEffort) * rect.w;
      result.push({...it, bx:cx, by:cy, bw:bw, bh:curRowH});
      cx += bw;
    }

    rem = rem.slice(row.length);
    cy += curRowH;
  }

  // Any overflow items: squeeze into final partial row
  if(rem.length > 0){
    const availH = rect.y + rect.h - cy;
    if(availH > 10){
      const curRowH = availH;
      let cx = rect.x;
      for(const it of rem){
        const bw = (it.effort / total) * rect.w;
        result.push({...it, bx:cx, by:cy, bw:bw, bh:curRowH});
        cx += bw;
      }
    }
  }

  return result;
}

function getDepsSet(items,hid){
  if(!hid)return null;
  const s=new Set(),map=Object.fromEntries(items.map(it=>[it.id,it]));
  const dn=id=>{if(s.has(id))return;s.add(id);(map[id]?.deps||[]).forEach(dn);};
  const up=id=>{if(s.has(id))return;s.add(id);items.filter(x=>(x.deps||[]).includes(id)).forEach(x=>up(x.id));};
  dn(hid);up(hid);return s;
}

window.TowerData = { LAYER_ORDER, LAYER_LABELS, STATUS_COLORS, STATUS_LABELS, PAGODA, MOCK, squarify, getDepsSet };

</script>
<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;
const { LAYER_ORDER, LAYER_LABELS, STATUS_COLORS, STATUS_LABELS, PAGODA, squarify } = window.TowerData;

/* ═══════════════════════════════════════════════════════════
   SPIRE — bronze finial with stacked rings + flame-point top
   ═══════════════════════════════════════════════════════════ */
function Spire({width}){
  const w=Math.max(64,width*.42), cx=w/2;
  return(
    <div style={{display:"flex",justifyContent:"center",marginBottom:-4,position:"relative",zIndex:3}}>
      <svg width={w} height={72} viewBox={`0 0 ${w} 72`} style={{overflow:"visible"}}>
        <defs>
          <linearGradient id="brz" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#d4a64a"/><stop offset="55%" stopColor={PAGODA.bronze}/><stop offset="100%" stopColor={PAGODA.bronze_dk}/>
          </linearGradient>
        </defs>
        {/* flame point */}
        <path d={`M${cx} 0 L${cx-2.5} 10 L${cx+2.5} 10 Z`} fill="url(#brz)"/>
        {/* stem */}
        <rect x={cx-1} y={10} width="2" height="20" fill="url(#brz)"/>
        {/* stacked rings (baoding - 宝顶) */}
        {[0,1,2,3].map(i=>{
          const y=30+i*5, rw=4.5+i*1.4;
          return <ellipse key={i} cx={cx} cy={y} rx={rw} ry={1.8} fill="url(#brz)" stroke={PAGODA.bronze_dk} strokeWidth=".4"/>;
        })}
        {/* bulb */}
        <ellipse cx={cx} cy={55} rx="9" ry="6" fill="url(#brz)" stroke={PAGODA.bronze_dk} strokeWidth=".6"/>
        {/* base plate */}
        <rect x={cx-14} y={63} width="28" height="3" fill={PAGODA.tile_mid} stroke={PAGODA.tile_dark} strokeWidth=".3"/>
        <rect x={cx-16} y={66} width="32" height="3" fill={PAGODA.tile_dark}/>
      </svg>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   EAVE — curved grey-tile roof with upturned corners (飞檐)
   No text on eave (moved to side labels)
   ═══════════════════════════════════════════════════════════ */
function Eave({width, small=false}){
  const overhang=small?18:30;
  const ew=width+overhang*2;
  const h=small?24:32;
  const curveUp=small?4:6;
  return(
    <div style={{position:"relative",height:h,display:"flex",justifyContent:"center",zIndex:2,marginTop:-2,marginBottom:-2}}>
      <svg width={ew+24} height={h+8} viewBox={`0 0 ${ew+24} ${h+8}`} style={{overflow:"visible"}}>
        <defs>
          <linearGradient id={`tile-g-${width}-${small?1:0}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={PAGODA.tile_light}/>
            <stop offset="45%" stopColor={PAGODA.tile_mid}/>
            <stop offset="100%" stopColor={PAGODA.tile_dark}/>
          </linearGradient>
        </defs>
        {/* roof body — a swooping shape with flared corners */}
        <path
          d={`M12 ${h+4}
              Q14 ${h-curveUp} 24 ${h-curveUp-2}
              L${overhang*0.8} 8
              Q${overhang} 2, ${overhang+18} 4
              L${ew-overhang-18} 4
              Q${ew-overhang} 2, ${ew-overhang*0.8} 8
              L${ew+12-24} ${h-curveUp-2}
              Q${ew+12-14} ${h-curveUp} ${ew+12} ${h+4}
              Z`}
          fill={`url(#tile-g-${width}-${small?1:0})`}
          stroke={PAGODA.tile_dark} strokeWidth=".6"/>
        {/* tile ridges — horizontal lines */}
        {[0.35,0.55,0.78].map((f,i)=>(
          <path key={i} d={`M${overhang*0.9} ${4+(h-4)*f} L${ew+12-overhang*0.9} ${4+(h-4)*f}`}
            stroke={PAGODA.tile_dark} strokeWidth=".3" opacity=".5"/>
        ))}
        {/* ridge cap on top */}
        <rect x={overhang+20} y="2" width={ew-overhang*2-40} height="3" fill={PAGODA.tile_dark} rx="1"/>
        {/* 斗栱 bracket indication — small dark rectangles under the eave */}
        {Array.from({length: Math.max(6, Math.floor(width/45))}).map((_,i,arr)=>{
          const step=(width-20)/arr.length;
          const x=overhang+12+10+i*step;
          return <rect key={i} x={x} y={h-3} width="3" height="4" fill={PAGODA.wood_dark} opacity=".75"/>;
        })}
      </svg>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   WOOD BALCONY — thin railing strip under eave / above body
   ═══════════════════════════════════════════════════════════ */
function Balcony({width}){
  const ew=width+18;
  return(
    <div style={{display:"flex",justifyContent:"center",position:"relative",zIndex:1,marginTop:-4}}>
      <svg width={ew} height={10} viewBox={`0 0 ${ew} 10`}>
        <rect x="0" y="0" width={ew} height="3" fill={PAGODA.wood_dark}/>
        <rect x="0" y="3" width={ew} height="4" fill={PAGODA.wood_mid}/>
        {/* balusters */}
        {Array.from({length: Math.floor(ew/12)}).map((_,i)=>(
          <rect key={i} x={4+i*12} y="3" width="1.5" height="4" fill={PAGODA.wood_dark} opacity=".6"/>
        ))}
        <rect x="0" y="7" width={ew} height="2" fill={PAGODA.wood_dark}/>
      </svg>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   FLOOR — wood body with cream plaster panels, bricks inside
   Height auto-grows to fit effort total
   ═══════════════════════════════════════════════════════════ */
function Floor({items,towerWidth,hoveredId,hlSet,assigneeFilter,gold,onEnter,onLeave,onClick,floorIndex}){
  const totalE=items.reduce((s,it)=>s+it.effort,0);
  /* Height: scales with total effort so bricks aren't cramped.
     Min 72, each effort unit ~= 4.2px, capped to keep tower balanced. */
  const h=Math.max(66, Math.min(totalE*3.4, 130));
  /* Inner content area — insets for the wood frame */
  const framePadX=10, framePadY=8;
  const contentW=towerWidth-framePadX*2;
  const contentH=h-framePadY*2;
  const laid=useMemo(()=>squarify(items,{x:0,y:0,w:contentW,h:contentH}),[items,contentW,contentH]);
  const bMap=Object.fromEntries(laid.map(b=>[b.id,b]));
  const G=1;
  return(
    <div style={{position:"relative",width:towerWidth,height:h,display:"flex",justifyContent:"center",zIndex:1}}>
      {/* wood frame/wall backdrop */}
      <div style={{position:"absolute",inset:0,
        background:`linear-gradient(180deg, ${PAGODA.wood_light} 0%, ${PAGODA.wood_mid} 45%, ${PAGODA.wood_dark} 100%)`,
        borderLeft:`2px solid ${PAGODA.wood_dark}`,
        borderRight:`2px solid ${PAGODA.wood_dark}`,
      }}/>
      {/* vertical wooden posts */}
      <div style={{position:"absolute",left:framePadX-2,top:0,bottom:0,width:3,background:PAGODA.wood_dark,opacity:.7}}/>
      <div style={{position:"absolute",right:framePadX-2,top:0,bottom:0,width:3,background:PAGODA.wood_dark,opacity:.7}}/>
      {/* top & bottom wood beams */}
      <div style={{position:"absolute",left:0,right:0,top:0,height:3,background:PAGODA.wood_dark}}/>
      <div style={{position:"absolute",left:0,right:0,bottom:0,height:3,background:PAGODA.wood_dark}}/>

      {/* brick panel — cream plaster inset holding the bricks */}
      <div style={{
        position:"absolute",
        left:framePadX,top:framePadY,
        width:contentW,height:contentH,
        background: gold
          ? `linear-gradient(180deg, ${STATUS_COLORS.done}22, ${STATUS_COLORS.done}0c)`
          : `linear-gradient(180deg, ${PAGODA.plaster} 0%, ${PAGODA.plaster_dk} 100%)`,
        boxShadow:"inset 0 1px 3px rgba(60,40,20,0.25), inset 0 -1px 1px rgba(255,255,255,0.15)",
      }}/>

      {/* BRICKS */}
      <div style={{position:"absolute",left:framePadX,top:framePadY,width:contentW,height:contentH}}>
        {items.map(item=>{
          const b=bMap[item.id];if(!b)return null;
          const sc=STATUS_COLORS[item.status];
          const hov=hoveredId===item.id;
          const dimByAssignee=assigneeFilter&&!assigneeFilter.has(item.assignee);
          const dimByHover=hlSet&&!hlSet.has(item.id);
          const opacity=dimByAssignee?0.2:dimByHover?0.14:1;
          const gld=gold&&item.status==="done";
          return(
            <div key={item.id} data-brick={item.id}
              onMouseEnter={()=>onEnter(item.id)} onMouseLeave={onLeave}
              onClick={()=>onClick(item)}
              style={{
                position:"absolute",left:b.bx+G,top:b.by+G,
                width:Math.max(0,b.bw-G*2),height:Math.max(0,b.bh-G*2),
                background:gld?`linear-gradient(135deg,${STATUS_COLORS.done},${STATUS_COLORS.done}cc)`:sc,
                borderRadius:2,cursor:"pointer",
                transition:"opacity .18s ease, box-shadow .18s ease",
                opacity, zIndex:hov?5:1,
                display:"flex",alignItems:"center",justifyContent:"center",
                padding:"2px 3px",overflow:"hidden",
                boxShadow:hov?`0 0 0 1.5px ${sc}, 0 2px 8px ${sc}40`:`inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -1px 0 rgba(0,0,0,0.18)`,
              }}>
              {b.bw>28&&b.bh>12&&(
                <span style={{
                  fontSize:9,
                  fontWeight:600,color:"rgba(255,255,255,0.92)",
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                  textShadow:"0 1px 2px rgba(0,0,0,0.35)",lineHeight:1,maxWidth:"100%",
                }}>
                  {b.bw>60?item.title:item.title.slice(0,2)}
                </span>
              )}
              {item.risk && b.bw>22 && b.bh>18 && (
                <span style={{position:"absolute",top:1,right:2,fontSize:7,color:"#ffd966"}}>⚠</span>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   FOUNDATION — stone base + red temple wall
   ═══════════════════════════════════════════════════════════ */
function Foundation({width}){
  const w=width+80;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginTop:-2}}>
      {/* temple red wall strip */}
      <div style={{width:w-10,height:22,background:`linear-gradient(180deg, ${PAGODA.red_wall}, #7a2a1c)`,
        borderTop:`2px solid ${PAGODA.wood_dark}`,
        position:"relative",
        boxShadow:"inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -2px 4px rgba(0,0,0,0.25)"}}>
        {/* door arch suggestion */}
        <div style={{position:"absolute",left:"50%",top:4,transform:"translateX(-50%)",width:28,height:18,
          background:`linear-gradient(180deg,#3a1a10,#1a0a06)`,
          borderRadius:"14px 14px 0 0",
          border:`1px solid ${PAGODA.bronze_dk}`}}/>
      </div>
      {/* stone platform */}
      <div style={{width:w,height:9,background:`repeating-linear-gradient(90deg, ${PAGODA.stone} 0 22px, #9e947f 22px 24px)`,borderTop:`1px solid ${PAGODA.tile_dark}`,borderBottom:`1px solid #6e6252`}}/>
      <div style={{width:w+16,height:5,background:PAGODA.stone,borderTop:`1px solid #6e6252`}}/>
      <div style={{width:w+22,height:3,background:"#6e6252"}}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   DEP LINES — dashed overlay connecting hovered brick to deps
   ═══════════════════════════════════════════════════════════ */
function DepLines({items,hoveredId,towerRef}){
  const[lines,setLines]=useState([]);
  useEffect(()=>{
    if(!hoveredId||!towerRef.current){setLines([]);return;}
    const item=items.find(it=>it.id===hoveredId);if(!item){setLines([]);return;}
    const tR=towerRef.current.getBoundingClientRect();
    const gc=id=>{const el=towerRef.current.querySelector(`[data-brick="${id}"]`);if(!el)return null;const r=el.getBoundingClientRect();return{x:r.left+r.width/2-tR.left,y:r.top+r.height/2-tR.top};};
    const hc=gc(hoveredId);if(!hc){setLines([]);return;}
    const nl=[];
    (item.deps||[]).forEach(d=>{const dc=gc(d);if(dc)nl.push({x1:hc.x,y1:hc.y,x2:dc.x,y2:dc.y});});
    items.filter(it=>(it.deps||[]).includes(hoveredId)).forEach(it=>{const dc=gc(it.id);if(dc)nl.push({x1:hc.x,y1:hc.y,x2:dc.x,y2:dc.y});});
    setLines(nl);
  },[hoveredId,items]);
  if(!lines.length)return null;
  return(<svg style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:10,width:"100%",height:"100%"}}>
    {lines.map((l,i)=><line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={PAGODA.bronze} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.65"/>)}
  </svg>);
}

window.TowerPagoda = { Eave, Spire, Foundation, Floor, DepLines, Balcony };

</script>
<script type="text/babel">
const { useState: useStateD, useEffect: useEffectD } = React;
const { LAYER_ORDER: LO, LAYER_LABELS: LL, STATUS_COLORS: SC, STATUS_LABELS: SL } = window.TowerData;

function Drawer({item,onClose,onUpdate,onCreate,items,assignees}){
  const[form,setForm]=useStateD(item);
  const[depSearch,setDepSearch]=useStateD("");
  const[err,setErr]=useStateD("");
  const[depsOpen,setDepsOpen]=useStateD(false);
  useEffectD(()=>{setForm(item);setDepSearch("");setErr("");setDepsOpen(false);},[item]);
  if(!item)return null;
  const isNew=!!item._isNew;

  const wouldCycle=(candidateId)=>{
    if(candidateId===form.id)return true;
    const map=Object.fromEntries(items.map(x=>[x.id,x]));
    const seen=new Set();
    const walk=id=>{
      if(seen.has(id))return false;
      seen.add(id);
      const it=map[id];if(!it)return false;
      for(const d of (it.deps||[])){if(d===form.id)return true;if(walk(d))return true;}
      return false;
    };
    return walk(candidateId);
  };
  const toggleDep=(id)=>{
    const cur=form.deps||[];
    if(cur.includes(id)){setForm({...form,deps:cur.filter(x=>x!==id)});setErr("");}
    else if(wouldCycle(id)){setErr("添加该依赖会形成循环");}
    else{setForm({...form,deps:[...cur,id]});setErr("");}
  };
  const bumpEffort=(delta)=>{
    const v=Math.max(1,Math.min(20,(form.effort||1)+delta));
    setForm({...form,effort:v});
  };
  const save=()=>{
    if(!form.title||!form.title.trim()){setErr("请填写标题");return;}
    if(!form.layer){setErr("请选择楼段");return;}
    if(isNew){onCreate({...form,title:form.title.trim()});}
    else{onUpdate({...form,title:form.title.trim()});}
  };
  const selectedDepItems=(form.deps||[]).map(d=>items.find(x=>x.id===d)).filter(Boolean);
  const depOf=!isNew?items.filter(x=>(x.deps||[]).includes(form.id)):[];
  const q=depSearch.toLowerCase().trim();
  const depCandidates=items.filter(x=>x.id!==form.id&&(q===""||x.title.toLowerCase().includes(q)));
  const depsByLayer={};
  LO.forEach(L=>{depsByLayer[L]=depCandidates.filter(x=>x.layer===L);});

  const label=(t)=><div style={{fontSize:8,fontWeight:700,color:"#9a8e7a",letterSpacing:".06em",textTransform:"uppercase",marginBottom:5}}>{t}</div>;
  const inputSt={width:"100%",padding:"6px 8px",borderRadius:3,border:"1px solid #d4c8b0",background:"#fff",fontSize:11,color:"#3d3528",fontFamily:"inherit",outline:"none",boxSizing:"border-box"};

  return(<>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.1)",zIndex:99}} onClick={onClose}/>
    <div style={{position:"fixed",top:0,right:0,width:360,height:"100vh",background:"#f8f4ec",borderLeft:"1px solid #d4c8b0",zIndex:100,display:"flex",flexDirection:"column",animation:"drawerIn .24s cubic-bezier(.16,1,.3,1)"}}>
      <div style={{padding:"20px 18px 12px",borderBottom:"1px solid #e4ddd0"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,marginRight:8}}>
            <div style={{fontSize:8,fontWeight:700,color:"#9a8e7a",letterSpacing:".1em",textTransform:"uppercase",marginBottom:4}}>{isNew?"新增事项":LL[form.layer]}</div>
            <input value={form.title||""} onChange={e=>setForm({...form,title:e.target.value})} placeholder="请输入标题…"
              style={{width:"100%",fontSize:15,fontWeight:700,color:"#3d3528",lineHeight:1.3,fontFamily:"'Fraunces',Georgia,serif",border:"none",background:"transparent",outline:"none",borderBottom:"1px dashed #d4c8b0",paddingBottom:2,boxSizing:"border-box"}}/>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,color:"#b5a88e",cursor:"pointer",lineHeight:1}}>×</button>
        </div>
      </div>

      <div style={{flex:1,overflow:"auto",padding:"14px 18px",display:"flex",flexDirection:"column",gap:14}}>
        <div>{label("所属楼段")}
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {LO.map(L=>(<button key={L} onClick={()=>setForm({...form,layer:L})} style={{padding:"3px 8px",borderRadius:3,fontSize:9.5,fontWeight:600,cursor:"pointer",border:form.layer===L?"2px solid #6b7c4e":"1px solid #d4c8b0",background:form.layer===L?"#6b7c4e22":"#fff",color:form.layer===L?"#6b7c4e":"#9a8e7a"}}>{LL[L]}</button>))}
          </div>
        </div>

        <div>{label("状态")}
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {Object.entries(SL).map(([k,lb])=>(<button key={k} onClick={()=>setForm({...form,status:k})} style={{padding:"3px 9px",borderRadius:3,fontSize:9.5,fontWeight:600,cursor:"pointer",border:form.status===k?`2px solid ${SC[k]}`:"1px solid #d4c8b0",background:form.status===k?SC[k]+"22":"#fff",color:form.status===k?SC[k]:"#9a8e7a"}}>{lb}</button>))}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>{label("工作量 (人天)")}
            <div style={{display:"flex",alignItems:"center",gap:4,background:"#fff",border:"1px solid #d4c8b0",borderRadius:3,padding:"3px 4px"}}>
              <button onClick={()=>bumpEffort(-1)} style={{width:20,height:20,border:"1px solid #d4c8b0",background:"#f8f4ec",color:"#5a5040",borderRadius:2,cursor:"pointer",fontSize:12,lineHeight:1}}>−</button>
              <input type="number" min={1} max={20} value={form.effort||1} onChange={e=>{const v=parseInt(e.target.value)||1;setForm({...form,effort:Math.max(1,Math.min(20,v))});}} style={{flex:1,textAlign:"center",border:"none",background:"transparent",fontSize:13,fontWeight:700,color:"#3d3528",outline:"none",fontFamily:"Georgia,serif",width:"100%"}}/>
              <button onClick={()=>bumpEffort(1)} style={{width:20,height:20,border:"1px solid #d4c8b0",background:"#f8f4ec",color:"#5a5040",borderRadius:2,cursor:"pointer",fontSize:12,lineHeight:1}}>+</button>
            </div>
          </div>
          <div>{label("负责人")}
            <input list="assignee-list" value={form.assignee||""} onChange={e=>setForm({...form,assignee:e.target.value})} placeholder="姓名 / 团队" style={inputSt}/>
            <datalist id="assignee-list">{assignees.map(a=><option key={a} value={a}/>)}</datalist>
          </div>
        </div>

        <div>{label(`依赖 (${(form.deps||[]).length})`)}
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:6}}>
            {selectedDepItems.length===0&&<span style={{fontSize:9.5,color:"#b5a88e",fontStyle:"italic"}}>暂无依赖</span>}
            {selectedDepItems.map(d=>(<span key={d.id} onClick={()=>toggleDep(d.id)} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 6px",background:"#fff",border:"1px solid "+SC[d.status]+"55",borderRadius:3,fontSize:9,color:"#5a5040",cursor:"pointer"}}><span style={{width:5,height:5,borderRadius:"50%",background:SC[d.status]}}/>{d.title}<span style={{color:"#b5a88e",marginLeft:2}}>×</span></span>))}
          </div>
          <button onClick={()=>setDepsOpen(v=>!v)} style={{width:"100%",padding:"4px 8px",background:"#fff",border:"1px dashed #d4c8b0",borderRadius:3,fontSize:9.5,color:"#7a6e5d",cursor:"pointer",textAlign:"left"}}>{depsOpen?"▼ 收起选择器":"▶ 添加 / 编辑依赖…"}</button>
          {depsOpen&&<div style={{marginTop:6,background:"#fff",border:"1px solid #d4c8b0",borderRadius:4,padding:8}}>
            <input value={depSearch} onChange={e=>setDepSearch(e.target.value)} placeholder="搜索事项…" style={{...inputSt,marginBottom:6,fontSize:10}}/>
            <div style={{maxHeight:180,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
              {LO.map(L=>{const arr=depsByLayer[L];if(!arr||!arr.length)return null;return(<div key={L}>
                <div style={{fontSize:8,fontWeight:700,color:"#9a8e7a",letterSpacing:".06em",marginBottom:2,textTransform:"uppercase"}}>{LL[L]}</div>
                {arr.map(c=>{const sel=(form.deps||[]).includes(c.id);const cyc=!sel&&wouldCycle(c.id);return(<div key={c.id} onClick={()=>!cyc&&toggleDep(c.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 5px",borderRadius:2,cursor:cyc?"not-allowed":"pointer",opacity:cyc?0.4:1,background:sel?"rgba(107,124,78,0.12)":"transparent"}}>
                  <div style={{width:10,height:10,borderRadius:1.5,border:"1.5px solid "+(sel?"#6b7c4e":"#d4c8b0"),background:sel?"#6b7c4e":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"#fff",fontSize:7,lineHeight:1}}>✓</span>}</div>
                  <span style={{width:5,height:5,borderRadius:"50%",background:SC[c.status]}}/>
                  <span style={{fontSize:9.5,color:"#5a5040",flex:1}}>{c.title}</span>
                  {cyc&&<span style={{fontSize:7,color:"#b5453a"}}>循环</span>}
                </div>);})}
              </div>);})}
              {depCandidates.length===0&&<div style={{fontSize:9.5,color:"#b5a88e",textAlign:"center",padding:8}}>无匹配事项</div>}
            </div>
          </div>}
        </div>

        {depOf.length>0&&<div>{label(`被依赖 ↑ (${depOf.length})`)}{depOf.map(d=>(<div key={d.id} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 7px",background:"#fff",borderRadius:3,marginBottom:2,border:"1px solid #e4ddd0"}}>
          <div style={{width:5,height:5,borderRadius:"50%",background:SC[d.status]}}/>
          <span style={{fontSize:9.5,color:"#5a5040",flex:1}}>{d.title}</span>
          <span style={{fontSize:8,color:"#9a8e7a"}}>{LL[d.layer]}</span>
        </div>))}</div>}

        <div>{label("风险")}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
            <input type="checkbox" checked={!!form.risk} onChange={e=>setForm({...form,risk:e.target.checked})} style={{accentColor:"#b5453a"}}/>
            <span style={{fontSize:10,color:form.risk?"#b5453a":"#9a8e7a",fontWeight:form.risk?700:500}}>{form.risk?"⚠ 标记为风险":"无风险"}</span>
          </label>
        </div>

        <div>{label("备注")}
          <textarea value={form.notes||""} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="补充说明（可选）" style={{...inputSt,minHeight:60,resize:"vertical",fontSize:10,lineHeight:1.4}}/>
        </div>

        {err&&<div style={{fontSize:9.5,color:"#b5453a",background:"#b5453a12",border:"1px solid #b5453a30",borderRadius:3,padding:"5px 8px"}}>{err}</div>}
      </div>

      <div style={{padding:"10px 18px 14px",borderTop:"1px solid #e4ddd0",display:"flex",gap:8,background:"#f8f4ec"}}>
        <button onClick={onClose} style={{flex:1,padding:"7px 0",borderRadius:3,border:"1px solid #d4c8b0",background:"#fff",color:"#7a6e5d",fontSize:10,fontWeight:600,cursor:"pointer"}}>取消</button>
        <button onClick={save} style={{flex:2,padding:"7px 0",borderRadius:3,border:"none",background:"#6b7c4e",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:".04em"}}>{isNew?"创建事项":"保存修改"}</button>
      </div>
    </div>
  </>);
}

function Report({items,onClose}){
  const today=new Date().toLocaleDateString("zh-CN");
  const grp=s=>items.filter(it=>it.status===s);
  const fmt=arr=>arr.map(it=>`  · ${it.title} [${LL[it.layer]}] @${it.assignee}`).join("\n");
  const report=`📋 项目日报 — ${today}\n\n✅ 完成 (${grp("done").length})\n${fmt(grp("done"))}\n\n🟠 进行中 (${grp("in_progress").length})\n${fmt(grp("in_progress"))}\n\n⬜ 待启动 (${grp("not_started").length})\n${fmt(grp("not_started"))}\n\n🟡 延期 (${grp("overdue").length})\n${fmt(grp("overdue"))}\n\n🔴 阻塞 (${grp("blocked").length})\n${fmt(grp("blocked"))}\n\n整体: ${Math.round((grp("done").length/items.length)*100)}%`;
  const[copied,setCopied]=useStateD(false);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",backdropFilter:"blur(4px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#f8f4ec",borderRadius:10,border:"1px solid #d4c8b0",width:"90%",maxWidth:480,maxHeight:"80vh",overflow:"auto",padding:20}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <h3 style={{fontSize:14,fontWeight:700,color:"#3d3528",margin:0,fontFamily:"'Fraunces',Georgia,serif"}}>进展日报</h3>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:14,color:"#b5a88e",cursor:"pointer"}}>×</button>
        </div>
        <pre style={{fontSize:9.5,lineHeight:1.7,color:"#5a5040",whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",background:"#fff",padding:14,borderRadius:6,border:"1px solid #e4ddd0",margin:0}}>{report}</pre>
        <button onClick={()=>{navigator.clipboard?.writeText(report);setCopied(true);setTimeout(()=>setCopied(false),1200);}} style={{marginTop:8,width:"100%",padding:"6px 0",borderRadius:4,border:"1px solid #d4c8b0",background:copied?"#6b7c4e":"#fff",color:copied?"#fff":"#5a5040",fontSize:10,fontWeight:600,cursor:"pointer"}}>{copied?"已复制 ✓":"复制到剪贴板"}</button>
      </div>
    </div>
  );
}

window.TowerDrawer = Drawer;
window.TowerReport = Report;

</script>
<script type="text/babel">
const { useState: useS, useMemo: useM, useRef: useR } = React;
const { LAYER_ORDER: LO2, LAYER_LABELS: LL2, STATUS_COLORS: SC2, STATUS_LABELS: SL2, PAGODA: PG, MOCK, getDepsSet } = window.TowerData;
const { Eave, Spire, Foundation, Floor, DepLines, Balcony } = window.TowerPagoda;
const Drawer = window.TowerDrawer;
const Report = window.TowerReport;

function SidePanel({items,assigneeFilter,setAssigneeFilter,onNew}){
  const assignees=[...new Set(items.map(i=>i.assignee).filter(Boolean))].sort();
  return(
    <div style={{width:200,padding:"20px 14px",background:"rgba(248,244,236,0.5)",borderRight:"1px solid #e4ddd0",display:"flex",flexDirection:"column",gap:14,overflowY:"auto"}}>
      <button onClick={onNew} style={{padding:"8px 10px",borderRadius:4,border:"1.5px dashed #6b7c4e",background:"rgba(107,124,78,0.08)",color:"#6b7c4e",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ 新增事项</button>
      <div>
        <div style={{fontSize:8,fontWeight:700,color:"#9a8e7a",letterSpacing:".08em",textTransform:"uppercase",marginBottom:6}}>按负责人过滤</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {assignees.map(a=>{
            const sel=assigneeFilter.has(a);
            const count=items.filter(i=>i.assignee===a).length;
            return(<div key={a} onClick={()=>{const ns=new Set(assigneeFilter);if(sel)ns.delete(a);else ns.add(a);setAssigneeFilter(ns);}} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 5px",borderRadius:2,cursor:"pointer",background:sel?"rgba(107,124,78,0.15)":"transparent"}}>
              <div style={{width:9,height:9,borderRadius:1.5,border:"1.5px solid "+(sel?"#6b7c4e":"#d4c8b0"),background:sel?"#6b7c4e":"transparent"}}/>
              <span style={{fontSize:9.5,color:"#5a5040",flex:1}}>{a}</span>
              <span style={{fontSize:8,color:"#9a8e7a"}}>{count}</span>
            </div>);
          })}
        </div>
        {assigneeFilter.size>0&&<button onClick={()=>setAssigneeFilter(new Set())} style={{marginTop:6,fontSize:8.5,color:"#7a6e5d",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>清除过滤</button>}
      </div>
      <div>
        <div style={{fontSize:8,fontWeight:700,color:"#9a8e7a",letterSpacing:".08em",textTransform:"uppercase",marginBottom:6}}>图例</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {Object.entries(SL2).map(([k,v])=>(<div key={k} style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:10,height:10,borderRadius:1.5,background:SC2[k]}}/>
            <span style={{fontSize:9.5,color:"#5a5040"}}>{v}</span>
          </div>))}
        </div>
      </div>
    </div>
  );
}

function TowerApp(){
  const[items,setItems]=useS(MOCK.items);
  const[selected,setSelected]=useS(null);
  const[hovered,setHovered]=useS(null);
  const[assigneeFilter,setAssigneeFilter]=useS(new Set());
  const[showReport,setShowReport]=useS(false);
  const towerRef=useR(null);
  const LO=LO2;

  const byLayer=useM(()=>{const m={};LO.forEach(L=>m[L]=items.filter(i=>i.layer===L));return m;},[items]);
  const hlSet=useM(()=>hovered?getDepsSet(items,hovered):null,[hovered,items]);
  const allDone=items.every(i=>i.status==="done");
  const assignees=[...new Set(items.map(i=>i.assignee).filter(Boolean))].sort();

  /* Width steps are subtle — real pagoda floors are nearly uniform, only slight widening near base */
  const widths={vision:260,design:278,infrastructure:296,capability:316,coordination:334,ui:352};
  const doneCt=items.filter(i=>i.status==="done").length;
  const pct=Math.round((doneCt/items.length)*100);

  const handleNew=()=>setSelected({_isNew:true,id:"new_"+Date.now(),title:"",layer:"capability",status:"not_started",effort:3,deps:[],assignee:"",risk:false,notes:""});
  const handleUpdate=(it)=>{setItems(items.map(x=>x.id===it.id?it:x));setSelected(null);};
  const handleCreate=(it)=>{const{_isNew,...clean}=it;setItems([...items,clean]);setSelected(null);};

  return(
    <div style={{width:"100vw",height:"100vh",display:"flex",
      background:`radial-gradient(ellipse at 50% 10%, #f0e6d0 0%, #d9cbb0 60%, #b8a88a 100%)`,
      fontFamily:"'Inter',-apple-system,sans-serif",overflow:"hidden"}}>
      <style>{`@keyframes drawerIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
      .sideLabel{font-family:'Fraunces','Noto Serif SC',Georgia,serif;writing-mode:vertical-rl;text-orientation:upright;letter-spacing:.2em}`}</style>
      <SidePanel items={items} assigneeFilter={assigneeFilter} setAssigneeFilter={setAssigneeFilter} onNew={handleNew}/>

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"14px 20px 10px",borderBottom:"1px solid #e4ddd0",display:"flex",justifyContent:"space-between",alignItems:"flex-end",background:"rgba(248,244,236,0.6)"}}>
          <div>
            <div style={{fontSize:8,fontWeight:700,color:"#9a8e7a",letterSpacing:".15em",textTransform:"uppercase",marginBottom:3}}>项目塔</div>
            <h1 style={{fontSize:18,fontWeight:700,color:"#3d3528",margin:0,fontFamily:"'Fraunces',Georgia,serif"}}>{MOCK.name}</h1>
            <div style={{fontSize:9.5,color:"#7a6e5d",marginTop:2,maxWidth:560}}>{MOCK.goal}</div>
          </div>
          <div style={{display:"flex",gap:14,alignItems:"center"}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:18,fontWeight:700,color:"#6b7c4e",fontFamily:"Georgia,serif",lineHeight:1}}>{pct}%</div>
              <div style={{fontSize:8,color:"#9a8e7a",letterSpacing:".06em"}}>{doneCt}/{items.length} 完成</div>
            </div>
            <button onClick={()=>setShowReport(true)} style={{padding:"6px 12px",borderRadius:3,border:"1px solid #d4c8b0",background:"#fff",color:"#5a5040",fontSize:10,fontWeight:600,cursor:"pointer"}}>📋 日报</button>
          </div>
        </div>

        <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 20px 40px"}}>
          <div ref={towerRef} style={{position:"relative",display:"flex",flexDirection:"column",alignItems:"center"}}>
            <Spire width={widths.vision}/>
            {LO.map((L,idx)=>{
              const w=widths[L];
              const isTop=idx===0;
              return(<div key={L} style={{position:"relative",display:"flex",flexDirection:"column",alignItems:"center"}}>
                {/* side label (plaque-style) — to the right of each floor */}
                <div style={{position:"absolute",right:-130,top:18,display:"flex",alignItems:"center",gap:8,zIndex:4,pointerEvents:"none"}}>
                  <svg width="22" height="38" viewBox="0 0 22 38">
                    <path d="M2 6 Q11 0 20 6 L20 32 Q11 38 2 32 Z" fill={PG.bronze} stroke={PG.bronze_dk} strokeWidth=".6"/>
                    <path d="M4 8 Q11 3 18 8 L18 30 Q11 35 4 30 Z" fill="none" stroke={PG.bronze_dk} strokeWidth=".5"/>
                  </svg>
                  <div style={{fontFamily:"'Fraunces','Noto Serif SC',Georgia,serif",fontSize:11,fontWeight:700,color:PG.wood_dark,letterSpacing:".08em",whiteSpace:"nowrap"}}>
                    {LL2[L]}
                    <div style={{fontSize:7.5,color:PG.bronze_dk,letterSpacing:".15em",fontWeight:500,textTransform:"uppercase",marginTop:1}}>{L}</div>
                  </div>
                </div>
                {/* side tick/line to anchor */}
                <div style={{position:"absolute",right:-20,top:28,width:18,height:1,background:PG.bronze_dk,opacity:.5,zIndex:3}}/>

                <Eave width={w} small={isTop}/>
                <Balcony width={w}/>
                <Floor items={byLayer[L]} towerWidth={w} hoveredId={hovered} hlSet={hlSet} assigneeFilter={assigneeFilter.size?assigneeFilter:null} gold={allDone}
                  onEnter={setHovered} onLeave={()=>setHovered(null)} onClick={setSelected} floorIndex={idx}/>
              </div>);
            })}
            {/* final bottom eave over foundation */}
            <Eave width={widths.ui+16}/>
            <Foundation width={widths.ui}/>
            <DepLines items={items} hoveredId={hovered} towerRef={towerRef}/>
          </div>

          <div style={{marginTop:20,fontSize:10,color:PG.wood_dark,letterSpacing:".2em",fontStyle:"italic",fontFamily:"'Fraunces',Georgia,serif",opacity:.7}}>应 县 木 塔 · 悬 停 查 看 依 赖 · 点 击 编 辑</div>
        </div>
      </div>

      {selected&&<Drawer item={selected} items={items} assignees={assignees} onClose={()=>setSelected(null)} onUpdate={handleUpdate} onCreate={handleCreate}/>}
      {showReport&&<Report items={items} onClose={()=>setShowReport(false)}/>}
    </div>
  );
}

window.TowerApp = TowerApp;

</script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.TowerApp));
</script>
</body></html>
